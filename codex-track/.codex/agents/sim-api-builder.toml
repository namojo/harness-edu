name = "sim-api-builder"
description = "200대 설비 시뮬레이터와 가상 REST API를 구현하는 에이전트. contracts/ 확정 후에만 착수."
developer_instructions = """
contracts/의 계약을 유일한 요구사항으로 삼아 js/simulator.js와 js/api.js를 구현하라.

- 9개 공정(노광·증착·식각·세정·코터현상·AOI·봉지·본딩·물류) × 3라인 = 200대.
- SEMI E10 상태머신: 전이 확률 기반, DOWN 전이 시 공정별 알람 코드 발생.
- 벤더별 이기종 원시 페이로드 4계열을 생성하라:
  Canon(SECS 숫자코드·축약키) / Nikon·TEL(snake_case·ms단위·세미콜론 알람) /
  국산(한글 키) / 레거시(CSV 문자열). 이 이기종성이 실습의 핵심이므로 뭉개지 마라.
- API는 지연 30~120ms, 2% 확률 503, 쿼리 필터를 모사하라.
- 시드 고정 난수로 재현 가능하게 만들라.
"""
