# config.example.toml — Codex 실무 설정 예시
#
# 이 내용을 ~/.codex/config.toml 에 반영하면 아래 프로파일을 -p 이름으로 호출할 수 있다.
# 기존 설정이 있으면 [profiles.*] 와 [mcp_servers.*] 블록만 병합하라.

# 기본 모델 (이 빌드 기본은 gpt-5.5). 플랜/계정에 따라 조정.
model = "gpt-5.5"

# ---------------------------------------------------------------------------
# 프로파일 — 반복 작업의 옵션 묶음. 매번 긴 플래그를 치는 대신 -p 이름으로 호출.
# ---------------------------------------------------------------------------

# 분석·리뷰용: 읽기 전용, 사고 강도 높임. 자동화의 안전한 기본값.
[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

# 패치 생성용: 작업 루트에만 쓰기 허용.
[profiles.patch]
model = "gpt-5.5"
sandbox_mode = "workspace-write"

# ---------------------------------------------------------------------------
# MCP 서버 — tool/ 실습에서 만든 생산지표 계산기를 Codex 도구 풀에 추가.
# 경로는 각자 환경에 맞게 절대경로로 수정.
# ---------------------------------------------------------------------------
[mcp_servers.production-metrics]
command = "python"
args = ["C:\\Work\\harness-edu\\tool\\mcp-server\\server.py"]
